name: Anime Sama Scraper

on:
  workflow_dispatch:
    inputs:
      page_offset:
        description: 'Décalage (0=pages 1-9, 9=pages 10-18, 18=pages 19-27, 27=pages 28-36, 36=pages 37-43)'
        required: true
        default: '0'
      episode_delay:
        description: 'Délai entre épisodes en secondes (0.2 recommandé)'
        required: true
        default: '0.2'

permissions:
  contents: write

jobs:
  scrape:
    name: "Page ${{ github.event.inputs.page_offset }}+${{ matrix.page_offset_add }}"
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        include:
          - { page_offset_add: 1 }
          - { page_offset_add: 2 }
          - { page_offset_add: 3 }
          - { page_offset_add: 4 }
          - { page_offset_add: 5 }
          - { page_offset_add: 6 }
          - { page_offset_add: 7 }
          - { page_offset_add: 8 }
          - { page_offset_add: 9 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q playwright aiohttp
          playwright install chromium --with-deps

      - name: Compute page number
        id: page
        run: |
          PAGE=$(( ${{ github.event.inputs.page_offset }} + ${{ matrix.page_offset_add }} ))
          echo "num=$PAGE" >> $GITHUB_OUTPUT
          echo "Page number: $PAGE"

      # Git identity configurée AVANT le scraping
      # pour que git_push() dans scraper.py fonctionne immédiatement
      - name: Setup git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Scrape page ${{ steps.page.outputs.num }}
        env:
          PAGE_NUM:      ${{ steps.page.outputs.num }}
          EPISODE_DELAY: ${{ github.event.inputs.episode_delay }}
        run: python scraper.py

      # Push final pour le fichier récapitulatif page_N.json
      # (les animés individuels sont déjà pushés en temps réel par scraper.py)
      - name: Push page summary
        run: |
          git pull origin main
          git add AnimeData/page_${{ steps.page.outputs.num }}.json || true
          git diff --staged --quiet || git commit -m "summary: page ${{ steps.page.outputs.num }} [$(date +'%Y-%m-%d %H:%M')]"
          git push || true
